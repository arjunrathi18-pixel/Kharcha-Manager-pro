name: kharcha_manager
description: Personal finance & vehicle expense tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  fl_chart: ^0.68.0
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  intl: ^0.19.0
  uuid: ^4.4.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "file_00000000b9c871fb9437d3793d64cfdb.png"
  min_sdk_android: 21
