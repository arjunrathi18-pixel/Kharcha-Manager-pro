name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Save custom pubspec.yaml and lib/ aside
        run: |
          mkdir -p /tmp/custom
          cp pubspec.yaml /tmp/custom/pubspec.yaml
          cp -r lib /tmp/custom/lib

      - name: Scaffold a fresh Flutter project (correct Android v2 embedding)
        run: |
          flutter create --org com.kharchamanager --project-name kharcha_manager /tmp/scaffold

      - name: Copy platform folders (android, ios, etc.) into repo
        run: |
          cp -r /tmp/scaffold/android ./android
          cp -r /tmp/scaffold/ios ./ios
          cp -r /tmp/scaffold/web ./web || true
          cp -r /tmp/scaffold/linux ./linux || true
          cp -r /tmp/scaffold/macos ./macos || true
          cp -r /tmp/scaffold/windows ./windows || true

      - name: Restore custom pubspec.yaml and lib/
        run: |
          cp /tmp/custom/pubspec.yaml ./pubspec.yaml
          rm -rf ./lib
          cp -r /tmp/custom/lib ./lib

      - name: Pin known-compatible Gradle / AGP / Kotlin / SDK versions
        run: |
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.1.4" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
          }

          include ":app"
          EOF

          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file("local.properties")
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader("UTF-8") { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
          if (flutterVersionCode == null) {
              flutterVersionCode = "1"
          }

          def flutterVersionName = localProperties.getProperty("flutter.versionName")
          if (flutterVersionName == null) {
              flutterVersionName = "1.0"
          }

          android {
              namespace = "com.kharchamanager.kharcha_manager"
              compileSdk = 34
              ndkVersion = flutter.ndkVersion

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = JavaVersion.VERSION_1_8.toString()
              }

              sourceSets {
                  main.java.srcDirs += "src/main/kotlin"
              }

              defaultConfig {
                  applicationId = "com.kharchamanager.kharcha_manager"
                  minSdk = 21
                  targetSdk = 34
                  versionCode = flutterVersionCode.toInteger()
                  versionName = flutterVersionName
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.debug
                  }
              }
          }

          flutter {
              source = "../.."
          }
          EOF

          sed -i 's#distributionUrl=.*#distributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-all.zip#' android/gradle/wrapper/gradle-wrapper.properties

          echo "---- Final settings.gradle ----"
          cat android/settings.gradle
          echo "---- Final app/build.gradle (top) ----"
          head -20 android/app/build.gradle
          echo "---- Final gradle-wrapper.properties ----"
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Remove old adaptive icon XML (forces new plain icon to be used)
        run: |
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          rm -f android/app/src/main/res/values/colors.xml
          find android/app/src/main/res -name "ic_launcher_background.xml" -delete
          find android/app/src/main/res -name "ic_launcher_foreground.xml" -delete

      - name: Generate app icons from source image
        run: dart run flutter_launcher_icons

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kharcha-manager-apk
          path: build/app/outputs/flutter-apk/app-release.apk
